<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Complex UI Plugin — Demo</title><link rel="stylesheet" href="style.css"/></head><body><div class="container"><h1>Complex UI Plugin — Demo</h1><p class="small">Enter a name and fetch demographic info (client-side). You can also call the server-side plugin action (VM2) if your host exposes <code>/api/plugins/execute</code>.</p><div style="display:flex;gap:8px;margin-bottom:12px"><input id="name" type="text" placeholder="Enter first name (e.g. michael)"/><button id="btnFetch">Client Fetch</button><button id="btnRunServer">Run Server Action</button></div><div id="output" class="small"></div><hr/><div class="small">Notes: client fetch uses public APIs directly. Server action uses safe.http inside VM2 (host must allow the hosts).</div></div><script src="app.js"></script></body></html>
