services:
  postgres:
    image: postgres:15
    container_name: whms_postgres1
    restart: unless-stopped
    environment:
      POSTGRES_USER: whms
      POSTGRES_PASSWORD: whmspass
      POSTGRES_DB: whms_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: whms_redis1
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
